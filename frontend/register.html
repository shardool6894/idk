<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ram Bhakt Mandal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
</head>

<body class="auth-page">

    <!-- Include your standard <header> and <nav> here as usual -->

    <main id="content-area" class="auth-wrapper">
        <div class="auth-box">
            <h1>HELLO THERE</h1>
            <p class="auth-subtitle">Create an account</p>

            <form action="POST" class="auth-form">
                <!-- Change to type="text" for Name on the Register page -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="auth-btn">REGISTER</button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <script type="module" src="home.js"></script>
</body>

</html>
